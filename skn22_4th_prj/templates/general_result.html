<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>일반 성분/제품 안내</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink-900: #0f2a24;
        --ink-700: #32544c;
        --line: #d0e5df;
        --brand-700: #006d5b;
        --bg: #f4fbf8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Sora", "Noto Sans KR", sans-serif;
        color: var(--ink-900);
        background:
          radial-gradient(860px 400px at 110% -10%, #d8fff4 0%, transparent 62%),
          radial-gradient(760px 300px at -10% 115%, #ffe8cf 0%, transparent 64%),
          var(--bg);
      }

      .wrap {
        width: min(980px, calc(100% - 2rem));
        margin: 1.2rem auto 2rem;
      }

      .back {
        text-decoration: none;
        color: #1f5f53;
        font-weight: 700;
        font-size: 0.9rem;
      }

      .card {
        margin-top: 0.8rem;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: #fff;
        box-shadow: 0 16px 36px rgba(4, 37, 32, 0.08);
        padding: 1.25rem;
      }

      .badge {
        display: inline-block;
        border-radius: 999px;
        padding: 0.28rem 0.68rem;
        background: #e6f8f2;
        color: var(--brand-700);
        font-size: 0.75rem;
        font-weight: 800;
      }

      h1 {
        margin: 0.72rem 0 0;
        font-size: clamp(1.25rem, 3vw, 1.8rem);
        letter-spacing: -0.02em;
      }

      .query {
        margin-top: 0.5rem;
        color: var(--ink-700);
        font-size: 0.9rem;
      }

      .answer {
        margin-top: 1rem;
        border: 1px solid #dcece7;
        border-radius: 12px;
        background: #f9fdfb;
        padding: 0.95rem;
        font-size: 0.92rem;
        line-height: 1.65;
        color: #20433c;
        white-space: pre-wrap;
      }

      .notice {
        margin-top: 1rem;
        border: 1px solid #f0d6c1;
        border-radius: 24px;
        background: #fff8f2;
        padding: 1rem 1.2rem;
      }

      .notice-title {
        margin: 0 0 0.35rem 0;
        color: #b05a12;
        font-size: 1.05rem;
        font-weight: 800;
      }

      .notice-text {
        margin: 0;
        color: #8f4f18;
        font-size: 1.02rem;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <a href="/" class="back">&larr; 메인으로 돌아가기</a>
      <section class="card">
        <span class="badge">LLM 일반 안내</span>
        <h1>성분/제품 일반 안내 결과</h1>
        <p class="query"><strong>질문:</strong> {{ query }}</p>
        <div class="answer">{{ answer|default:"안내 내용을 생성하지 못했습니다." }}</div>
        <div class="notice">
          <h2 class="notice-title">주의사항</h2>
          <p class="notice-text">
            참고용으로만 사용하시기 바랍니다. 의학적인 자문이나 진단이 필요한 경우 전문가에게 문의하세요. AI 답변에 오류가 있을 수 있습니다.
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
